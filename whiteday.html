<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Day Special Memories</title>
    <style>
        /* --- 全体の設定 --- */
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --accent-pink: #ff8fa3;
            --tape-color: rgba(255, 182, 193, 0.6);
            --fusen-yellow: #fff9c4;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            color: #444;
            /* 背景：動くグラデーション演出 */
            background: linear-gradient(-45deg, #fff5f7, #fef9e7, #ffe4e1, #fffafa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- ヘッダー演出 --- */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--accent-pink);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .scroll-down {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #bbb;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- 思い出カード（ポラロイド風） --- */
        .memory-section {
            margin-bottom: 100px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.0s ease-out;
        }

        .memory-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .polaroid {
            background: white;
            padding: 15px 15px 60px 15px; /* 下を広くしてポラロイド風に */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 2px;
            position: relative;
        }

        /* カードを交互に少し傾ける */
        .memory-section:nth-child(odd) .polaroid { transform: rotate(-2deg); }
        .memory-section:nth-child(even) .polaroid { transform: rotate(2deg); }

        .polaroid img {
            width: 100%;
            height: auto;
            display: block;
            filter: sepia(10%); /* ほんのりレトロに */
        }

        /* --- 吹き出し（付箋＋マステ風） --- */
        .speech-bubble {
            position: absolute;
            bottom: -30px; /* 写真の下に被せる */
            right: 10px;
            background: var(--fusen-yellow);
            padding: 12px 20px;
            width: 80%;
            border-radius: 5px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* マスキングテープの演出 */
        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            width: 70px;
            height: 25px;
            background: var(--tape-color);
            border-left: 2px dotted rgba(0,0,0,0.1);
            border-right: 2px dotted rgba(0,0,0,0.1);
        }

        .speech-bubble p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
            font-weight: 500;
        }

        /* --- フッターメッセージ --- */
        footer {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .final-card {
            background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(255,143,163,0.2);
        }

        .final-card h2 {
            color: var(--accent-pink);
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Happy White Day</h1>
            <p>バレンタインのお礼に<br>二人の思い出をまとめました</p>
            <div class="scroll-down">Scroll Down ↓</div>
        </header>

        <div class="memory-section js-scroll">
            <div class="polaroid">
                <img src="photo1.jpg" alt="思い出の写真1">
                <div class="speech-bubble">
                    <p>ここに一言メッセージを入れてね！初めてデートした時の写真とか。</p>
                </div>
            </div>
        </div>

        <div class="memory-section js-scroll">
            <div class="polaroid">
                <img src="photo2.jpg" alt="思い出の写真2">
                <div class="speech-bubble">
                    <p>手作りチョコ、本当に美味しかったよ！ありがとう。</p>
                </div>
            </div>
        </div>

        <footer>
            <div class="final-card js-scroll">
                <h2>Thank You!</h2>
                <p>いつも隣にいてくれてありがとう。<br>これからもたくさん思い出作ろうね。</p>
            </div>
        </footer>
    </div>

    <script>
        /* スクロールに合わせて表示させるエンジニア御用達のJS */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.js-scroll').forEach(el => observer.observe(el));
    </script>
</body>
</html>
