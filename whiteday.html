<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Day 2026</title>
    <style>
        :root {
            --main-pink: #ffafbd;
            --sub-pink: #ffc3a0;
            --text-color: #5d5d5d;
        }
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            color: var(--text-color);
            background: linear-gradient(135deg, #fff5f7 0%, #fef9e7 100%);
            overflow-x: hidden;
        }
        /* 背景に動きをつける（エンジニア演出） */
        .bg-circles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }
        .circle {
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: var(--main-pink);
            animation: move 10s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        header h1 {
            font-size: 2.5rem;
            color: #ff6b81;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* 写真カードのデザイン */
        .memory-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 80px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
        }
        .memory-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .memory-card img {
            width: 100%;
            border-radius: 15px;
            display: block;
        }
        .memory-card p {
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.8;
            padding: 0 10px;
        }

        footer {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .final-msg {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b81;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(255,107,129,0.2);
        }
        /* 吹き出しのデザイン */
        .speech-bubble {
            position: relative;
            background: #fff0f3; /* 薄いピンク色 */
            border-radius: 15px;
            padding: 15px 20px;
            margin-top: 20px;
            color: #ff6b81; /* 文字色もピンクに */
            font-size: 1rem;
            line-height: 1.6;
            filter: drop-shadow(0 4px 10px rgba(255,107,129,0.1));
        }

        /* 吹き出しの三角部分 */
        .speech-bubble:after {
            content: '';
            position: absolute;
            top: -15px; /* 上側に三角を出す */
            left: 30px; /* 三角の位置（左から30px） */
            border-style: solid;
            border-width: 0 15px 15px; /* 三角の形 */
            border-color: transparent transparent #fff0f3; /* 三角の色を吹き出しと同じに */
            display: block;
            width: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-circles">
        <div class="circle" style="top: 10%; left: 10%;"></div>
        <div class="circle" style="bottom: 10%; right: 10%; background: #ffc3a0;"></div>
    </div>

    <div class="container">
        <header>
            <h1>Happy White Day</h1>
            <p>バレンタインのお礼に<br>二人の思い出をまとめました</p>
            <p style="margin-top: 50px; font-size: 0.8rem; color: #aaa;">Scroll Down</p>
        </header>

        <div class="memory-card js-scroll">
            <img src="photo1.jpg" alt="思い出1">
            <div class="speech-bubble">
                ここに一言メッセージ。例えば「初めて一緒に行ったあの場所、楽しかったね！」など。
            </div>
        </div>

        <div class="memory-card js-scroll">
            <img src="photo2.jpg" alt="思い出2">
            <div class="speech-bubble">
                ここに一言メッセージ。例えば「手作りチョコ、本当に美味しかったよ。ありがとう！」など。
            </div>
        </div>

        <footer>
            <div class="final-msg js-scroll">
                いつもありがとう。<br>
                これからもよろしくね！
            </div>
        </footer>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.js-scroll').forEach(el => observer.observe(el));
    </script>
</body>
</html>
